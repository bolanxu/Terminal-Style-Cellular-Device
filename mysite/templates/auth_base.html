<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Terminal Phone{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080b0e;
    --bg2:       #0d1117;
    --bg3:       #131920;
    --border:    #1c2a35;
    --border2:   #243040;
    --accent:    #3de8c0;
    --accent2:   #1ab89a;
    --glow:      rgba(61,232,192,0.15);
    --text:      #b8cad6;
    --text-dim:  #4d6070;
    --white:     #e8f0f5;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'Syne', sans-serif;
    --danger:    #ff4d6d;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* Corner glow */
  body::after {
    content: '';
    position: fixed;
    bottom: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(61,232,192,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .auth-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo .tag {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .auth-logo h1 {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .auth-logo h1 span { color: var(--accent); }

  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 32px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(61,232,192,0.05);
  }

  .auth-card h2 {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .auth-card .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  input[type=text],
  input[type=password],
  input[type=tel] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--white);
    padding: 11px 14px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }
  input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px var(--glow);
  }
  input::placeholder { color: var(--text-dim); }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #050d0b;
    border: none;
    padding: 12px;
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    text-transform: uppercase;
  }
  .btn-submit:hover { background: #5cf5d5; }
  .btn-submit:active { transform: scale(0.99); }

  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .auth-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .auth-footer a:hover { color: #5cf5d5; }

  .flash-msg {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-left: 3px solid var(--danger);
    color: #ff8fa3;
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 12px;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 22px 0;
    position: relative;
  }
  .divider span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg2);
    padding: 0 10px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="tag">// system</div>
    <h1>Terminal<span>Phone</span></h1>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash-msg">⚠ {{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>
</body>
</html>
