{% extends "auth_base.html" %}
{% block title %}Sign Up — Terminal Phone{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Create account</h2>
  <div class="subtitle">// register your device and phone number</div>

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="your_handle" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Phone Number <span style="color:var(--accent);font-size:9px">(10-digit US)</span></label>
      <input type="tel" name="phone" placeholder="4195551234" maxlength="14" required
             oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••••" autocomplete="new-password" required>
    </div>
    <button type="submit" class="btn-submit">Register →</button>
  </form>

  <div class="divider"><span>OR</span></div>
</div>

<div class="auth-footer">
  Already registered? <a href="{{ url_for('auth.login') }}">Sign in</a>
</div>
{% endblock %}
